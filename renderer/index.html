<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:8000"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastScribe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>FastScribe</h1>
      <p class="subtitle">Local audio transcription · faster-whisper</p>
    </header>

    <main>
      <div class="controls">
        <label for="langSelect">Language</label>
        <select id="langSelect">
          <option value="auto">Auto-detect</option>
          <option value="es" selected>Spanish</option>
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ca">Catalan</option>
          <option value="nl">Dutch</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ko">Korean</option>
        </select>
      </div>

      <section id="dropzone" class="dropzone">
        <div class="dropzone-inner">
          <div class="dropzone-icon">🎙️</div>
          <p class="dropzone-title">Drop audio here</p>
          <p class="dropzone-hint">or</p>
          <button id="selectBtn" class="btn">Choose file</button>
          <p class="dropzone-formats">.mp3 · .wav · .m4a · .opus</p>
        </div>
        <input
          id="fileInput"
          type="file"
          accept=".mp3,.wav,.m4a,.opus,audio/mpeg,audio/wav,audio/x-m4a,audio/opus,audio/ogg"
          hidden
        />
      </section>

      <section id="status" class="status hidden">
        <div class="status-row">
          <div class="spinner"></div>
          <span id="statusText">Transcribing…</span>
          <span id="statusPct" class="status-pct"></span>
        </div>
        <div class="progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section class="list-section">
        <h2>Transcriptions</h2>
        <div id="empty" class="empty">No transcriptions yet.</div>
        <ul id="list" class="list"></ul>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>

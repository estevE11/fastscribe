<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:8000"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastScribe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="topbar">
    <header class="app-header">
      <div class="app-title">
        <h1>FastScribe</h1>
        <p class="subtitle">Local audio transcription</p>
      </div>
    </header>

      <section id="status" class="status hidden">
        <div class="status-row">
          <div class="spinner"></div>
          <span id="statusText">Transcribing…</span>
          <span id="statusPct" class="status-pct"></span>
        </div>
        <div class="progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <div class="list-heading-row">
        <h2 class="list-heading">Transcriptions</h2>
        <div class="header-controls">
          <select id="langSelect" title="Transcription language">
            <option value="auto">Auto-detect</option>
            <option value="es" selected>Spanish</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ca">Catalan</option>
            <option value="nl">Dutch</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="ko">Korean</option>
          </select>
          <button id="selectBtn" class="btn">New transcription +</button>
          <input
            id="fileInput"
            type="file"
            accept=".mp3,.wav,.m4a,.opus,audio/mpeg,audio/wav,audio/x-m4a,audio/opus,audio/ogg"
            hidden
          />
        </div>
      </div>
    </div>

    <main class="list-section">
      <div id="empty" class="empty">No transcriptions yet.</div>
      <ul id="list" class="list"></ul>
    </main>

    <div id="dropOverlay" class="drop-overlay">
      <div class="drop-overlay-inner">
        <div class="drop-overlay-icon">🎙️</div>
        <p>Drop audio to transcribe</p>
        <p class="drop-overlay-formats">.mp3 · .wav · .m4a · .opus</p>
      </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
      <div class="modal" role="dialog" aria-modal="true">
        <p id="confirmMessage" class="modal-message">Delete this transcription?</p>
        <div class="modal-actions">
          <button id="confirmCancel" class="btn btn-ghost">Cancel</button>
          <button id="confirmOk" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="renderer.js"></script>
  </body>
</html>

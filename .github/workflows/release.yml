name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install pyinstaller==6.11.1

      - name: Freeze Python backend
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --name fastscribe-backend \
            --distpath python_backend/dist \
            --workpath python_backend/build \
            --specpath python_backend \
            --collect-all faster_whisper \
            --collect-all ctranslate2 \
            --collect-all onnxruntime \
            --collect-all tokenizers \
            --collect-all av \
            --collect-all huggingface_hub \
            python_backend/main.py

      - name: Install Node dependencies
        run: npm ci

      - name: Build installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer certificate in CI: ship an unsigned macOS build.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --publish never

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ### macOS install note

            Builds are unsigned. macOS may quarantine the app (or move it to the
            Bin as "malware" — a false positive from the unsigned bundle). After
            dragging **FastScribe** to Applications, run:

            ```bash
            xattr -cr /Applications/FastScribe.app
            ```

            then open it normally.
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
